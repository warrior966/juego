<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WARZONE 3D MOBILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d4ff; --neon-red: #ff0055; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; touch-action: none; color: white; }
        
        #ui-container { 
            position: absolute; width: 100%; height: 100%; display: flex; 
            justify-content: center; align-items: center; z-index: 1000;
            background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, #000 100%);
            backdrop-filter: blur(10px);
        }

        .panel { 
            background: rgba(15,15,25,0.9); padding: 40px; border-radius: 20px; 
            border: 1px solid var(--neon); width: 320px; text-align: center;
        }

        h2 { font-family: 'Orbitron'; color: var(--neon); text-shadow: 0 0 10px var(--neon); margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: rgba(255,255,255,0.05); color: white; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-google { width: 100%; padding: 12px; background: transparent; color: white; border: 1px solid #555; border-radius: 8px; margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* Controles de Juego */
        #joystick-move { position: absolute; bottom: 50px; left: 50px; width: 150px; height: 150px; z-index: 2000; display: none; }
        #joystick-look { position: absolute; bottom: 50px; right: 50px; width: 150px; height: 150px; z-index: 2000; display: none; }
        #fire-btn { 
            position: absolute; bottom: 220px; right: 75px; width: 90px; height: 90px; 
            background: var(--neon-red); border: 4px solid white; border-radius: 50%; 
            display: none; justify-content: center; align-items: center; font-weight: bold; z-index: 2000;
        }
        
        #hud { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-left: 3px solid var(--neon); display: none; z-index: 500; font-family: 'Orbitron'; font-size: 12px; }
        #weapon-dock { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; z-index: 500; }
        .weapon-btn { width: 60px; height: 60px; background: #111; border: 1px solid #444; color: white; border-radius: 10px; font-size: 9px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .active-weapon { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-size: 24px; pointer-events: none; display: none; z-index: 500; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="auth-panel" class="panel">
            <h2>LOGIN</h2>
            <input type="email" id="email" placeholder="EMAIL">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="btn-main" onclick="handleAuth()">LOGIN</button>
            <button class="btn-google" onclick="loginWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> GOOGLE
            </button>
        </div>
        <div id="room-panel" class="panel" style="display:none">
            <h2>SALA</h2>
            <button class="btn-main" style="background:#28a745" onclick="window.createRoom()">CREAR SALA</button>
            <input type="text" id="roomCodeInput" placeholder="CÓDIGO">
            <button class="btn-main" onclick="window.joinRoom()">UNIRSE</button>
        </div>
    </div>

    <div id="hud"><b>SCORE</b><div id="scores"></div></div>
    <div id="crosshair">+</div>
    <div id="weapon-dock">
        <div class="weapon-btn active-weapon" onclick="setWeapon(0)">🔫<br>PISTOL</div>
        <div class="weapon-btn" onclick="setWeapon(1)">💥<br>SHOTGUN</div>
        <div class="weapon-btn" onclick="setWeapon(2)">🎯<br>SNIPER</div>
    </div>

    <div id="joystick-move"></div>
    <div id="joystick-look"></div>
    <div id="fire-btn" ontouchstart="window.shoot()">FIRE</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLUU7XWS6TTByiGd-rtBCPZNzKvvRcL9Q",
            authDomain: "juego-b85b7.firebaseapp.com",
            projectId: "juego-b85b7",
            appId: "1:714273620829:web:1e8d68161db2711270deb4"
        };
        firebase.initializeApp(firebaseConfig);
        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try { await firebase.auth().signInWithEmailAndPassword(e,p); grant(); } catch(err) {
                try { await firebase.auth().createUserWithEmailAndPassword(e,p); grant(); } catch(e2) { alert(e2.message); }
            }
        }
        async function loginWithGoogle() {
            const p = new firebase.auth.GoogleAuthProvider();
            try { await firebase.auth().signInWithPopup(p); grant(); } catch(e) { alert(e.message); }
        }
        function grant() { document.getElementById('auth-panel').style.display='none'; document.getElementById('room-panel').style.display='block'; }
    </script>
</body>
</html>
