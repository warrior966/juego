<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Battle Warzone</title>
    <style>
        /* ... MANTENER TODOS LOS ESTILOS ANTERIORES ... */
        
        .btn-google {
            width: 100%;
            padding: 12px;
            background: white;
            color: #444;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google img { width: 18px; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="auth-panel" class="panel">
            <h2>WARZONE LOGIN</h2>
            <input type="email" id="email" placeholder="Correo Electrónico">
            <input type="password" id="password" placeholder="Contraseña">
            <button class="btn-main" onclick="handleAuth()">ENTRAR PARTIDA</button>
            
            <div class="divider">O CONTINÚA CON</div>
            
            <button class="btn-google" onclick="loginWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google">
                INICIAR CON GOOGLE
            </button>
        </div>

        <div id="room-panel" class="panel" style="display:none">
            <h2>SALA DE ESPERA</h2>
            <button class="btn-secondary" onclick="window.createRoom()">+ CREAR NUEVA SALA</button>
            <div class="divider">O ÚNETE A UNA</div>
            <input type="text" id="roomCodeInput" placeholder="CÓDIGO DE SALA" maxlength="5">
            <button class="btn-main" onclick="window.joinRoom()">UNIRSE AHORA</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLUU7XWS6TTByiGd-rtBCPZNzKvvRcL9Q",
            authDomain: "juego-b85b7.firebaseapp.com",
            projectId: "juego-b85b7",
            appId: "1:714273620829:web:1e8d68161db2711270deb4"
        };
        firebase.initializeApp(firebaseConfig);

        // LOGIN TRADICIONAL
        async function handleAuth() {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('password').value;
            try {
                await firebase.auth().signInWithEmailAndPassword(e,p);
                accessGranted();
            } catch(err) {
                try {
                    await firebase.auth().createUserWithEmailAndPassword(e,p);
                    accessGranted();
                } catch(e2) { alert("Error: " + e2.message); }
            }
        }

        // NUEVO: LOGIN CON GOOGLE
        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                // En iPad/Móvil es mejor usar signInWithRedirect, 
                // pero signInWithPopup es más rápido para probar.
                await firebase.auth().signInWithPopup(provider);
                accessGranted();
            } catch (error) {
                alert("Error con Google: " + error.message);
            }
        }

        function accessGranted() {
            document.getElementById('auth-panel').style.display='none';
            document.getElementById('room-panel').style.display='block';
        }
    </script>
</body>
</html>
